<section class="services">
  <h1>Our Services</h1>

  <div class="card">
    <h3>CCTV Installation</h3>
    <p>Professional setup</p>
    <button class="btn btn-primary repbtn" (click)="openForm('CCTV Installation')">
      Book Technician
    </button>
  </div>

  <div class="card card2">
    <h3>Repair</h3>
    <p>Fix camera issues</p>
    <button class="btn btn-primary repbtn" (click)="openForm('Repair')">Book Technician</button>
  </div>
</section>

<!-- ✅ CENTER POPUP (NO EXTRA SPACE, NO FOOTER ISSUE) -->
<div class="overlay" *ngIf="isFormOpen">
  <div class="modal-box" (click)="$event.stopPropagation()">
    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5>Book {{ selectedService }}</h5>
      <button type="button" class="btn-close" (click)="isFormOpen = false"></button>
    </div>

    <!-- Form -->

    <form class="row g-3" (ngSubmit)="submitForm()">
      <div class="col-md-6">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" required />
      </div>

      <div class="col-md-6">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" required />
      </div>

      <div class="col-12">
        <label class="form-label">Address</label>
        <input type="text" class="form-control" placeholder="1234 Main St" />
      </div>

      <div class="col-12">
        <label class="form-label">Address 2</label>
        <input type="text" class="form-control" placeholder="Apartment, studio, or floor" />
      </div>

      <div class="col-md-6">
        <label class="form-label">City</label>
        <input type="text" class="form-control" />
      </div>

      <div class="col-md-4">
        <label class="form-label">State</label>
        <select class="form-select">
          <option selected>Choose...</option>
          <option>Andhra Pradesh</option>
          <option>Telangana</option>
        </select>
      </div>

      <div class="col-md-2">
        <label class="form-label">Zip</label>
        <input type="text" class="form-control" />
      </div>

      <div class="col-12">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" />
          <label class="form-check-label">Check me out</label>
        </div>
      </div>

      <!-- Buttons -->
      <div class="col-12 d-flex justify-content-end gap-2">
        <button type="button" class="btn btn-secondary" (click)="isFormOpen = false">Close</button>

        <button type="submit" class="btn btn-primary">Submit</button>
      </div>
    </form>
  </div>
</div>
