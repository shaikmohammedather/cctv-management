<section class="services">
  <h1>Our Services</h1>

  <!-- CARD 1 -->
  <div class="card">
    <h3>CCTV Installation</h3>
    <p>Professional setup</p>
    <button class="btn btn-primary repbtn" (click)="openForm('CCTV Installation')">
      Book Technician
    </button>
  </div>

  <!-- CARD 2 -->
  <div class="card card2">
    <h3>Repair</h3>
    <p>Fix camera issues</p>
    <button class="btn btn-primary repbtn" (click)="openForm('Repair')">Book Technician</button>
  </div>
</section>

<!-- ✅ MODAL START -->
<div class="modal fade show" *ngIf="isFormOpen" style="display: block">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <!-- HEADER -->
      <div class="modal-header">
        <h5 class="modal-title">Book {{ selectedService }}</h5>
        <button type="button" class="btn-close" (click)="isFormOpen = false"></button>
      </div>

      <!-- BODY -->
      <div class="modal-body">
        <form class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" />
          </div>

          <div class="col-md-6">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" />
          </div>

          <div class="col-12">
            <label class="form-label">Address</label>
            <input type="text" class="form-control" placeholder="1234 Main St" />
          </div>

          <div class="col-12">
            <label class="form-label">Address 2</label>
            <input type="text" class="form-control" placeholder="Apartment, studio, or floor" />
          </div>

          <div class="col-md-6">
            <label class="form-label">City</label>
            <input type="text" class="form-control" />
          </div>

          <div class="col-md-4">
            <label class="form-label">State</label>
            <select class="form-select">
              <option selected>Choose...</option>
            </select>
          </div>

          <div class="col-md-2">
            <label class="form-label">Zip</label>
            <input type="text" class="form-control" />
          </div>

          <div class="col-12">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" />
              <label class="form-check-label">Check me out</label>
            </div>
          </div>
        </form>
      </div>

      <!-- FOOTER -->
      <div class="modal-footer">
        <button class="btn btn-secondary" (click)="isFormOpen = false">Close</button>

        <button class="btn btn-primary" (click)="submitForm()">Submit</button>
      </div>
    </div>
  </div>
</div>

<!-- ✅ BACKDROP -->
<div class="modal-backdrop fade show" *ngIf="isFormOpen"></div>
